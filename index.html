<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Подсчет багажа в аэропорту</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            color:#333;
        }

        .container{
            width:1100px;
            margin:40px auto;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            color:#1f2937;
        }

        .subtitle{
            text-align:center;
            color:#777;
            margin-bottom:35px;
        }

        .panel{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
        }

        input[type=file]{
            margin-bottom:20px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 22px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            margin-right:10px;
            transition:.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .cards{
            display:flex;
            gap:20px;
            margin-top:30px;
            margin-bottom:30px;
        }

        .card{
            flex:1;
            background:white;
            border-radius:15px;
            padding:20px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
        }

        .card h2{
            font-size:34px;
            color:#2563eb;
            margin-bottom:8px;
        }

        .card p{
            color:#666;
        }

        #resultImage{
            width:100%;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.12);
            margin-top:20px;
        }

        footer{
            text-align:center;
            margin-top:40px;
            color:#888;
            font-size:14px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>✈️ Система подсчета багажа на ленте аэропорта</h1>

    <div class="subtitle">
        
    </div>

    <div class="panel">

        <input type="file" id="imageInput" accept="image/*">

        <br>

        <button onclick="processImage()">
            Запустить обработку
        </button>

        <button onclick="downloadExcel()">
            Скачать Excel
        </button>

    </div>


    <div class="cards">

        <div class="card">
            <h2 id="count">0</h2>
            <p>Обнаружено багажа</p>
        </div>

        <div class="card">
            <h2 id="time">0</h2>
            <p>Время обработки (сек.)</p>
        </div>

        <div class="card">
            <h2 id="model">YOLOv8n</h2>
            <p>Используемая модель</p>
        </div>

    </div>


    <img id="resultImage" src="">


</div>

<footer>

Практическая работа по компьютерному зрению • YOLOv8 • Flask • OpenCV

</footer>


<script>

async function processImage(){

    const file=document.getElementById("imageInput").files[0];

    if(!file){
        alert("Выберите изображение");
        return;
    }

    const formData=new FormData();

    formData.append("image",file);

    const response=await fetch("/process",{
        method:"POST",
        body:formData
    });

    const data=await response.json();

    document.getElementById("count").innerHTML=data.count;

    document.getElementById("time").innerHTML=data.processing_time;

    document.getElementById("model").innerHTML=data.model;

    document.getElementById("resultImage").src=data.result_image+"?"+new Date().getTime();

}

function downloadExcel(){

    window.location.href="/export";

}

</script>

</body>
</html>
